name: Android CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'web/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'web/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './web/package-lock.json'

    - name: Build web assets for Android
      working-directory: ./web
      run: |
        npm ci
        npm run build

    - name: Copy web assets into Android app
      run: |
        rm -rf app/src/main/assets/*
        mkdir -p app/src/main/assets
        cp -r web/dist/. app/src/main/assets/

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run tests
      run: ./gradlew test

    - name: Build debug APK
      run: ./gradlew assembleDebug

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: radiogoedvoorgoed-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

  build-release:
    runs-on: ubuntu-latest
    needs: build-debug
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './web/package-lock.json'

    - name: Build web assets for Android
      working-directory: ./web
      run: |
        npm ci
        npm run build

    - name: Copy web assets into Android app
      run: |
        rm -rf app/src/main/assets/*
        mkdir -p app/src/main/assets
        cp -r web/dist/. app/src/main/assets/

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode signing key
      env:
        SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY }}
      run: |
        echo "$SIGNING_KEY_BASE64" | base64 -d > /tmp/release.keystore
        ls -la /tmp/release.keystore

    - name: Build signed release APK
      env:
        KEYSTORE_PATH: /tmp/release.keystore
        KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        export KEYSTORE_PATH=/tmp/release.keystore
        export KEY_STORE_PASSWORD="${{ secrets.KEY_STORE_PASSWORD }}"
        export KEY_ALIAS="${{ secrets.ALIAS }}"
        export KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
        ./gradlew assembleRelease --info

    - name: Rename APK
      run: |
        mkdir -p app/build/outputs/apk/signed
        cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/signed/radiogoedvoorgoed-release.apk || \
        cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/signed/radiogoedvoorgoed-release.apk
        ls -la app/build/outputs/apk/release/
        ls -la app/build/outputs/apk/signed/ || true

    - name: Get version from build.gradle
      id: get_version
      run: |
        VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "App version: $VERSION"

    - name: Upload release APK to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/signed/radiogoedvoorgoed-release.apk
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        name: Release v${{ steps.get_version.outputs.VERSION }}
        body: |
          Automated release build from commit ${{ github.sha }}
          
          **Version:** ${{ steps.get_version.outputs.VERSION }}
          
          **Features:**
          - MediaSession for lock screen controls
          - Foreground service for background playback
          - Bluetooth media button support
          - Notification with play/pause controls
          
          Download the signed APK below to install on your Android device.
        draft: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload release APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: radiogoedvoorgoed-release-apk
        path: app/build/outputs/apk/signed/*.apk
        if-no-files-found: warn
