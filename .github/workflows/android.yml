name: Android CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'

jobs:
  build-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run tests
      run: ./gradlew test

    - name: Build debug APK
      run: ./gradlew assembleDebug

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: radiogoedvoorgoed-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

  build-release:
    runs-on: ubuntu-latest
    needs: build-debug
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build release APK
      run: ./gradlew assembleRelease

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Sign release APK
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Rename signed APK
      run: |
        mv app/build/outputs/apk/release/app-release-unsigned-signed.apk app/build/outputs/apk/release/radiogoedvoorgoed-release.apk || true
        mv app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/radiogoedvoorgoed-release.apk || true

    - name: Upload release APK to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/release/radiogoedvoorgoed-release.apk
        tag_name: v${{ github.run_number }}
        name: Release Build ${{ github.run_number }}
        body: |
          Automated release build from commit ${{ github.sha }}
          
          **Features:**
          - MediaSession for lock screen controls
          - Foreground service for background playback
          - Bluetooth media button support
          - Notification with play/pause controls
          
          Download the signed APK below to install on your Android device.
        draft: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload release APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: radiogoedvoorgoed-release-apk
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: error
