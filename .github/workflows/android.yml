name: Android CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'

jobs:
  build-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run tests
      run: ./gradlew test

    - name: Build debug APK
      run: ./gradlew assembleDebug

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: radiogoedvoorgoed-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

  build-release:
    runs-on: ubuntu-latest
    needs: build-debug
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build release APK
      run: ./gradlew assembleRelease

    - name: Sign release APK with apksigner
      env:
        SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY }}
        KEY_ALIAS: ${{ secrets.ALIAS }}
        KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        # Decode keystore
        echo "$SIGNING_KEY_BASE64" | base64 -d > /tmp/release.keystore
        
        # Find apksigner
        APK_SIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner -type f 2>/dev/null | head -1)
        if [ -z "$APK_SIGNER" ]; then
          # Fallback: use zipalign + jarsigner if apksigner not found
          zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release-aligned.apk
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore /tmp/release.keystore \
            -storepass "$KEY_STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            app/build/outputs/apk/release/app-release-aligned.apk \
            "$KEY_ALIAS"
          mv app/build/outputs/apk/release/app-release-aligned.apk app/build/outputs/apk/release/radiogoedvoorgoed-release.apk
        else
          # Use apksigner
          "$APK_SIGNER" sign \
            --ks /tmp/release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KEY_STORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/radiogoedvoorgoed-release.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
        fi
        
        # Cleanup
        rm /tmp/release.keystore
        
        # Verify APK was created
        ls -la app/build/outputs/apk/release/

    - name: Upload release APK to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/release/radiogoedvoorgoed-release.apk
        tag_name: v${{ github.run_number }}
        name: Release Build ${{ github.run_number }}
        body: |
          Automated release build from commit ${{ github.sha }}
          
          **Features:**
          - MediaSession for lock screen controls
          - Foreground service for background playback
          - Bluetooth media button support
          - Notification with play/pause controls
          
          Download the signed APK below to install on your Android device.
        draft: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload release APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: radiogoedvoorgoed-release-apk
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: error
