name: iOS Build (Unsigned IPA)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'web/**'
      - '.github/workflows/ios.yml'
      - 'capacitor.config.ts'
  pull_request:
    branches: [ main ]
    paths:
      - 'web/**'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      working-directory: ./web
      run: npm install

    - name: Build web app
      working-directory: ./web
      run: npm run build

    - name: Initialize Capacitor iOS
      working-directory: ./web
      run: |
        # Initialize the iOS platform if it doesn't exist
        if [ ! -d "ios" ]; then
          echo "Adding iOS platform..."
          npx cap add ios
        else
          echo "iOS platform already exists"
        fi
        # Sync the web build with iOS
        npx cap sync ios
        
        # List what was created for debugging
        echo "=== iOS directory contents ==="
        ls -la ios/

    - name: Build unsigned IPA
      working-directory: ./web/ios
      run: |
        # Create build directory
        mkdir -p build
        
        # Determine project file to use
        if [ -f "App.xcworkspace" ]; then
          echo "Using workspace: App.xcworkspace"
          PROJECT_ARG="-workspace App.xcworkspace"
        elif [ -f "App.xcodeproj/project.pbxproj" ]; then
          echo "Using project: App.xcodeproj"
          PROJECT_ARG="-project App.xcodeproj"
        else
          echo "Error: Neither workspace nor project found"
          echo "Available files:"
          ls -la
          exit 1
        fi
        
        # Build the iOS app without code signing
        xcodebuild \
          $PROJECT_ARG \
          -scheme App \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -derivedDataPath ./build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE="" \
          ONLY_ACTIVE_ARCH=NO \
          ARCHS="arm64" \
          build

        # Create Payload directory structure for IPA
        mkdir -p ./build/Payload
        
        # Find and copy the app bundle
        APP_PATH=$(find ./build/Build/Products/Release-iphoneos -name "*.app" -type d 2>/dev/null | head -n 1)
        if [ -z "$APP_PATH" ]; then
          # Try any build products directory
          APP_PATH=$(find ./build/Build/Products -name "*.app" -type d 2>/dev/null | head -n 1)
        fi
        
        if [ -n "$APP_PATH" ]; then
          echo "Found app bundle at: $APP_PATH"
          cp -R "$APP_PATH" ./build/Payload/
          
          # Create the IPA
          cd ./build
          zip -r ../RadioGoedvoorGoed-unsigned.ipa Payload
          cd ..
          
          echo "IPA created successfully"
          ls -lh ./RadioGoedvoorGoed-unsigned.ipa
        else
          echo "Error: Could not find .app bundle"
          echo "Build products directory contents:"
          find ./build/Build/Products -type d 2>/dev/null || echo "No products directory found"
          exit 1
        fi

    - name: Upload unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: RadioGoedvoorGoed-unsigned-ipa
        path: ./web/ios/RadioGoedvoorGoed-unsigned.ipa
        if-no-files-found: warn

  create-release:
    runs-on: ubuntu-latest
    needs: build-ios
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download unsigned IPA
      uses: actions/download-artifact@v4
      with:
        name: RadioGoedvoorGoed-unsigned-ipa
        path: ./artifacts

    - name: Get version
      id: get_version
      run: |
        # Use web package.json version
        VERSION=$(node -p "require('./web/package.json').version")
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "App version: $VERSION"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./artifacts/RadioGoedvoorGoed-unsigned.ipa
        tag_name: ios-v${{ steps.get_version.outputs.VERSION }}
        name: iOS Release v${{ steps.get_version.outputs.VERSION }}
        body: |
          ## iOS Unsigned IPA Release
          
          **Version:** ${{ steps.get_version.outputs.VERSION }}
          
          **⚠️ Important:** This is an **UNSIGNED** IPA file. 
          
          It requires sideloading to install on your iOS device. See [IOS_INSTALL.md](./IOS_INSTALL.md) for installation instructions.
          
          **Features:**
          - Radio streaming (128kbps MP3)
          - Now playing with listeners count
          - Recently played track history
          - Song requests
          - Podcasts playback
          - Background audio playback
          - Lock screen media controls
          
          **Installation Methods:**
          1. **AltStore** (Recommended) - Free, no jailbreak required
          2. **Sideloadly** - Alternative sideloading tool
          3. **TrollStore** (iOS 14.0 - 17.0)
          
          Download the IPA below to install on your iOS device.
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
