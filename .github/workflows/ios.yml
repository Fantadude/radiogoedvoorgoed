name: iOS Build (Unsigned IPA)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'web/**'
      - '.github/workflows/ios.yml'
      - 'capacitor.config.ts'
  pull_request:
    branches: [ main ]
    paths:
      - 'web/**'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      working-directory: ./web
      run: npm install

    - name: Build web app
      working-directory: ./web
      run: npm run build

    - name: Clean iOS build cache
      working-directory: ./web
      run: |
        echo "=== Cleaning iOS build caches ==="
        # Remove DerivedData to prevent any caching issues
        rm -rf ~/Library/Developer/Xcode/DerivedData/* 2>/dev/null || true
        
        # Clean ios build directory if it exists
        if [ -d "ios/build" ]; then
          rm -rf ios/build
        fi
        
        # Remove any existing xcuserdata (user-specific settings/cache)
        find ios -name "xcuserdata" -type d -exec rm -rf {} + 2>/dev/null || true
        
        echo "Cache cleaned"

    - name: Initialize Capacitor iOS
      working-directory: ./web
      run: |
        # Check if we have a proper iOS platform (both Podfile AND .xcodeproj are required)
        if [ ! -f "ios/App/Podfile" ] || [ ! -d "ios/App/App.xcodeproj" ]; then
          echo "iOS platform incomplete (missing Podfile or .xcodeproj) - removing and re-adding..."
          rm -rf ios
          echo "Adding iOS platform with Capacitor..."
          npx cap add ios
        else
          echo "iOS platform exists with both Podfile and .xcodeproj"
        fi

    - name: Sync web assets to iOS
      working-directory: ./web
      run: |
        # Sync the web build with iOS (this copies web assets from dist/)
        npx cap sync ios
        
        echo "=== iOS/App/App/public contents after sync ==="
        ls -la ios/App/App/public/ | head -20

    - name: Apply custom iOS icons
      working-directory: ./web
      run: |
        echo "=== Applying custom iOS icons from radio_logo.png ==="
        
        # Clean any existing icon assets first
        if [ -d "ios/App/App/Assets.xcassets/AppIcon.appiconset" ]; then
          echo "Removing old app icons..."
          rm -rf ios/App/App/Assets.xcassets/AppIcon.appiconset/*.png
        fi
        
        # Regenerate icons from radio_logo.png
        echo "Generating iOS icons from radio_logo.png..."
        node generate-ios-icons.cjs
        
        # Verify icons were created
        echo "=== Verifying iOS icons ==="
        ls -la ios/App/App/Assets.xcassets/AppIcon.appiconset/
        
        # Count icons to ensure they exist
        ICON_COUNT=$(ls ios/App/App/Assets.xcassets/AppIcon.appiconset/*.png 2>/dev/null | wc -l)
        echo "Found $ICON_COUNT icon files"
        
        if [ "$ICON_COUNT" -eq 0 ]; then
          echo "ERROR: No icon files generated!"
          exit 1
        fi

    - name: Install CocoaPods dependencies
      working-directory: ./web/ios/App
      run: |
        # Install CocoaPods if not present
        if ! command -v pod &> /dev/null; then
          echo "Installing CocoaPods..."
          gem install cocoapods
        fi
        
        # Clean pod cache to prevent stale dependencies
        echo "Cleaning pod cache..."
        pod cache clean --all || true
        
        # Install pods
        echo "Running pod install..."
        pod install
        
        echo "=== After pod install ==="
        ls -la ../

    - name: Build unsigned IPA
      working-directory: ./web/ios
      run: |
        # Create build directory
        mkdir -p build
        
        # Determine project file to use (workspace preferred for CocoaPods)
        if [ -d "App.xcworkspace" ]; then
          echo "Using workspace: App.xcworkspace"
          PROJECT_ARG="-workspace App.xcworkspace"
        elif [ -d "App/App.xcworkspace" ]; then
          echo "Using workspace: App/App.xcworkspace"
          PROJECT_ARG="-workspace App/App.xcworkspace"
        elif [ -d "App.xcodeproj" ]; then
          echo "Using project: App.xcodeproj"
          PROJECT_ARG="-project App.xcodeproj"
        elif [ -d "App/App.xcodeproj" ]; then
          echo "Using project: App/App.xcodeproj"
          PROJECT_ARG="-project App/App.xcodeproj"
        else
          echo "Error: No Xcode project found"
          echo "Available files:"
          ls -la
          ls -la App/ || echo "No App directory"
          exit 1
        fi
        
        # Clean build before building
        echo "Cleaning previous build..."
        xcodebuild \
          $PROJECT_ARG \
          -scheme App \
          -configuration Release \
          clean \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO
        
        # Build the iOS app without code signing
        echo "Building iOS app..."
        xcodebuild \
          $PROJECT_ARG \
          -scheme App \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -derivedDataPath ./build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE="" \
          ONLY_ACTIVE_ARCH=NO \
          ARCHS="arm64" \
          build

        # Create Payload directory structure for IPA
        mkdir -p ./build/Payload
        
        # Find and copy the app bundle
        APP_PATH=$(find ./build/Build/Products/Release-iphoneos -name "*.app" -type d 2>/dev/null | head -n 1)
        if [ -z "$APP_PATH" ]; then
          # Try any build products directory
          APP_PATH=$(find ./build/Build/Products -name "*.app" -type d 2>/dev/null | head -n 1)
        fi
        
        if [ -n "$APP_PATH" ]; then
          echo "Found app bundle at: $APP_PATH"
          
          # Verify the app has the correct icon
          echo "=== Checking app icon in bundle ==="
          ls -la "$APP_PATH/" | grep -i icon || echo "No obvious icon files found at root"
          ls -la "$APP_PATH/AppIcon*" 2>/dev/null || echo "No AppIcon files found"
          
          cp -R "$APP_PATH" ./build/Payload/
          
          # Create the IPA
          cd ./build
          zip -r ../RadioGoedvoorGoed-unsigned.ipa Payload
          cd ..
          
          echo "IPA created successfully"
          ls -lh ./RadioGoedvoorGoed-unsigned.ipa
        else
          echo "Error: Could not find .app bundle"
          echo "Build products directory contents:"
          find ./build/Build/Products -type d 2>/dev/null || echo "No products directory found"
          exit 1
        fi

    - name: Upload unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: RadioGoedvoorGoed-unsigned-ipa
        path: ./web/ios/RadioGoedvoorGoed-unsigned.ipa
        if-no-files-found: warn

  create-release:
    runs-on: ubuntu-latest
    needs: build-ios
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download unsigned IPA
      uses: actions/download-artifact@v4
      with:
        name: RadioGoedvoorGoed-unsigned-ipa
        path: ./artifacts

    - name: Get version
      id: get_version
      run: |
        # Use web package.json version
        VERSION=$(node -p "require('./web/package.json').version")
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "App version: $VERSION"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./artifacts/RadioGoedvoorGoed-unsigned.ipa
        tag_name: ios-v${{ steps.get_version.outputs.VERSION }}-${{ github.run_number }}
        name: iOS Release v${{ steps.get_version.outputs.VERSION }} (Build ${{ github.run_number }})
        body: |
          ## iOS Unsigned IPA Release
          
          **Version:** ${{ steps.get_version.outputs.VERSION }}
          **Build:** ${{ github.run_number }}
          **Commit:** ${{ github.sha }}
          
          **⚠️ Important:** This is an **UNSIGNED** IPA file. 
          
          It requires sideloading to install on your iOS device. See [IOS_INSTALL.md](./IOS_INSTALL.md) for installation instructions.
          
          **What's New:**
          - iOS-optimized radio streaming
          - Dark/Light mode support
          - Improved navigation buttons
          - Horizontal scrollable alphabet in requests
          - Android-style request details flow
          - Battery optimizations with background playback
          
          **Installation Methods:**
          1. **AltStore** (Recommended) - Free, no jailbreak required
          2. **Sideloadly** - Alternative sideloading tool
          3. **TrollStore** (iOS 14.0 - 17.0)
          
          **Note:** If you see the old Capacitor icon, delete any previous version of the app from your device before installing.
          
          Download the IPA below to install on your iOS device.
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
